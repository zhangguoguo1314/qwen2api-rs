<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>qwen2API 企业网关</title>
  <link rel="stylesheet" href="style.css" />
  <!-- 内嵌 SVG favicon，避免外部依赖 -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c5cff'/%3E%3Cstop offset='1' stop-color='%2300c2ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' font-size='16' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3EQ%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <!-- 移动端顶栏（含汉堡按钮，桌面隐藏） -->
  <header class="mobile-bar">
    <button id="menuToggle" class="icon-btn" aria-label="菜单">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <span class="mobile-title">qwen2API</span>
  </header>

  <!-- 侧边栏遮罩（移动端展开时显示） -->
  <div id="overlay" class="overlay"></div>

  <div class="layout">
    <!-- 左侧固定侧边栏 -->
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <span class="brand-logo">
          <svg viewBox="0 0 32 32" width="30" height="30">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#7c5cff"/>
                <stop offset="1" stop-color="#00c2ff"/>
              </linearGradient>
            </defs>
            <rect width="32" height="32" rx="8" fill="url(#bg)"/>
            <text x="16" y="22" font-size="16" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold">Q</text>
          </svg>
        </span>
        <div class="brand-text">
          <strong>qwen2API</strong>
          <small>企业网关</small>
        </div>
      </div>

      <nav class="nav">
        <a href="#/" data-route="/" class="nav-item">
          <span class="nav-ico">📊</span><span>运行状态</span>
        </a>
        <a href="#/stats" data-route="/stats" class="nav-item">
          <span class="nav-ico">📈</span><span>数据统计</span>
        </a>
        <a href="#/accounts" data-route="/accounts" class="nav-item">
          <span class="nav-ico">👥</span><span>账号管理</span>
        </a>
        <a href="#/tokens" data-route="/tokens" class="nav-item">
          <span class="nav-ico">🔑</span><span>API Key</span>
        </a>
        <a href="#/test" data-route="/test" class="nav-item">
          <span class="nav-ico">💬</span><span>接口测试</span>
        </a>
        <a href="#/images" data-route="/images" class="nav-item">
          <span class="nav-ico">🖼️</span><span>图片生成</span>
        </a>
        <a href="#/videos" data-route="/videos" class="nav-item">
          <span class="nav-ico">🎬</span><span>视频生成</span>
        </a>
        <a href="#/settings" data-route="/settings" class="nav-item">
          <span class="nav-ico">⚙️</span><span>系统设置</span>
        </a>
      </nav>

      <div class="sidebar-foot">
        <span class="dot" id="connDot"></span>
        <span id="connText">未连接</span>
      </div>
    </aside>

    <!-- 右侧内容区，由 app.js 渲染 -->
    <main id="view" class="view"></main>
  </div>

  <!-- toast 容器 -->
  <div id="toasts" class="toasts"></div>

  <script src="app.js"></script>
</body>
</html>
