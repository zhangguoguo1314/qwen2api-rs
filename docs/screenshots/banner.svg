<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" role="img" aria-label="qwen2api-rs — Qwen Web → OpenAI · Anthropic · Gemini">
  <defs>
    <!-- 背景漸層 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#10142a"/>
    </linearGradient>

    <!-- Qwen 源頭漸層（藍紫→青） -->
    <radialGradient id="qwenOrb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#7c83ff" stop-opacity="1"/>
      <stop offset="45%" stop-color="#615ced" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#00bcd4" stop-opacity="0.15"/>
    </radialGradient>
    <radialGradient id="qwenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#615ced" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#615ced" stop-opacity="0"/>
    </radialGradient>

    <!-- Rust 蟹 漸層 -->
    <radialGradient id="rustGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffb487" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ce422b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#dea584"/>
      <stop offset="100%" stop-color="#ce422b"/>
    </linearGradient>

    <!-- Pipeline 三條流向漸層 -->
    <linearGradient id="streamA" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#615ced" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#dea584" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="streamB" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#00bcd4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#dea584" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="streamC" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#7c83ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#dea584" stop-opacity="0.95"/>
    </linearGradient>

    <!-- 點陣網格 pattern -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#243049" opacity="0.35"/>
    </pattern>

    <!-- 標題模糊光暈 -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1600" height="480" fill="url(#bg)"/>
  <rect width="1600" height="480" fill="url(#grid)"/>

  <!-- 右側 Qwen orb 光暈 -->
  <circle cx="1330" cy="240" r="320" fill="url(#qwenGlow)"/>
  <circle cx="1330" cy="240" r="120" fill="url(#qwenOrb)"/>
  <!-- 抽象書法筆觸（暗示「通義」） -->
  <g stroke="#a5b4ff" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M1280 165 Q1330 150 1395 175" stroke-width="3.5"/>
    <path d="M1255 235 Q1330 220 1410 245" stroke-width="3"/>
    <path d="M1265 295 Q1330 280 1390 305" stroke-width="2.5"/>
    <path d="M1330 195 L1330 320" stroke-width="2.5"/>
  </g>

  <!-- 中央 pipeline：從 Qwen orb 出發，分三支流向左邊 Rust 蟹 -->
  <g fill="none" stroke-width="4" stroke-linecap="round">
    <path d="M1210 240 C 950 240, 850 140, 540 140" stroke="url(#streamA)"/>
    <path d="M1210 240 C 950 240, 850 240, 540 240" stroke="url(#streamB)"/>
    <path d="M1210 240 C 950 240, 850 340, 540 340" stroke="url(#streamC)"/>
  </g>

  <!-- 三個輸出端的抽象幾何 token（OpenAI / Anthropic / Gemini，無 logo） -->
  <!-- 上：圓 -->
  <g transform="translate(490,140)">
    <circle r="22" fill="#0d1117" stroke="#dea584" stroke-width="2.5"/>
    <circle r="9" fill="#dea584" opacity="0.9"/>
    <text x="40" y="6" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace" font-size="14" fill="#c9d1d9" opacity="0.85">OpenAI</text>
  </g>
  <!-- 中：六邊形 -->
  <g transform="translate(490,240)">
    <polygon points="0,-23 20,-12 20,12 0,23 -20,12 -20,-12" fill="#0d1117" stroke="#dea584" stroke-width="2.5"/>
    <polygon points="0,-10 9,-5 9,5 0,10 -9,5 -9,-5" fill="#dea584" opacity="0.9"/>
    <text x="40" y="6" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace" font-size="14" fill="#c9d1d9" opacity="0.85">Anthropic</text>
  </g>
  <!-- 下：三角 -->
  <g transform="translate(490,340)">
    <polygon points="0,-24 22,18 -22,18" fill="#0d1117" stroke="#dea584" stroke-width="2.5"/>
    <polygon points="0,-10 9,8 -9,8" fill="#dea584" opacity="0.9"/>
    <text x="40" y="6" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace" font-size="14" fill="#c9d1d9" opacity="0.85">Gemini</text>
  </g>

  <!-- 左側 Rust 蟹 Ferris silhouette（簡化、向右朝向中央） -->
  <g transform="translate(230,235)">
    <!-- 光暈 -->
    <circle r="170" fill="url(#rustGlow)"/>
    <!-- 蟹身 -->
    <g fill="url(#rust)">
      <!-- 主體 -->
      <ellipse cx="0" cy="0" rx="78" ry="48"/>
      <!-- 眼睛底座 -->
      <circle cx="38" cy="-44" r="14"/>
      <circle cx="14" cy="-46" r="14"/>
      <!-- 右側螯（朝中央方向） -->
      <path d="M 78 -8 Q 130 -28 158 -8 Q 144 6 124 -4 Q 112 4 96 8 Z"/>
      <path d="M 78 12 Q 132 22 150 4 Q 140 24 122 28 Q 100 22 88 18 Z" opacity="0.85"/>
      <!-- 左側螯 -->
      <path d="M -78 -8 Q -130 -28 -158 -8 Q -144 6 -124 -4 Q -112 4 -96 8 Z"/>
      <!-- 腳 -->
      <path d="M -50 38 Q -60 60 -78 64" stroke="#ce422b" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M -20 44 Q -22 70 -38 76" stroke="#ce422b" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M 20 44 Q 22 70 38 76" stroke="#ce422b" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M 50 38 Q 60 60 78 64" stroke="#ce422b" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>
    <!-- 眼瞳 -->
    <circle cx="42" cy="-44" r="4.5" fill="#0d1117"/>
    <circle cx="18" cy="-46" r="4.5" fill="#0d1117"/>
  </g>

  <!-- 標題文字 -->
  <g transform="translate(80,400)">
    <text font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace" font-weight="700" font-size="56" fill="#f0f6fc" filter="url(#softGlow)">qwen2api-rs</text>
    <text y="32" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace" font-size="18" fill="#8b949e" letter-spacing="1">Qwen Web  →  OpenAI · Anthropic · Gemini</text>
  </g>

  <!-- 右上角微標籤 -->
  <g transform="translate(1500,40)" text-anchor="end">
    <text font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace" font-size="13" fill="#6e7681" letter-spacing="1.5">RUST · AXUM · TOKIO</text>
  </g>
</svg>
