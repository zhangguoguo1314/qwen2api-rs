name: Deploy to HuggingFace Spaces

# 当推送到 main 分支时，自动同步代码到 HuggingFace Spaces Docker Space
# 需要在 GitHub 仓库 Settings → Secrets and variables → Actions 中添加：
#   HF_TOKEN: HuggingFace Access Token（需要 write 权限）

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 准备 HF 专用文件
        run: |
          # 用 HuggingFace 专用的 README 替换根目录 README（含 YAML frontmatter）
          mv README.md README.en.md
          mv huggingface_README.md README.md

      - name: 安装 huggingface_hub
        run: pip install huggingface_hub --break-system-packages

      - name: 推送到 HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: libai003
          HF_SPACE_NAME: qwen2api-rs
        run: |
          python3 << 'EOF'
          from huggingface_hub import HfApi
          import os

          api = HfApi()
          repo_id = f"{os.environ['HF_USER']}/{os.environ['HF_SPACE_NAME']}"
          
          # 上传整个仓库目录到 HF Space
          # .gitattributes 和 .git/ 会被自动跳过
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              token=os.environ["HF_TOKEN"],
              commit_message="自动部署: 从 GitHub 同步",
          )
          
          print(f"✅ 成功推送到 {repo_id}")
          EOF
